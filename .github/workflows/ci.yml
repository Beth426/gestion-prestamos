name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx jest --no-coverage

      - name: Build
        run: npm run build
